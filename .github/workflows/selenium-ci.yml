name: Selenium CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Lab9Automation.sln

      - name: Build solution
        run: dotnet build Lab9Automation.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Lab9Automation.sln --configuration Release --no-build --logger "trx;LogFileName=test-results-${{ matrix.browser }}.trx"

      - name: Upload test results if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            **/*.trx
            **/Screenshots/**
            **/screenshots/**