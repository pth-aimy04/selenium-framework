name: Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Lab9Automation.sln

      - name: Build
        run: dotnet build Lab9Automation.sln --configuration Release --no-restore

      - name: Test (${{ matrix.browser }})
        run: dotnet test Lab9Automation.sln --configuration Release --no-build --logger "trx;LogFileName=test-results-${{ matrix.browser }}.trx"
        env:
          BROWSER: ${{ matrix.browser }}
          SAUCEDEMO_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            **/*.trx
            screenshots/**